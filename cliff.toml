# git-cliff config — generates CHANGELOG.md from Conventional Commits.
# Adapted verbatim from hmcts/courtstranscribe's cliff.toml.
# See https://git-cliff.org/docs/configuration for the full reference.

[changelog]
header = """
# Changelog
All notable changes to this project are documented in this file.
"""
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] — {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}\
- {% if commit.scope %}**{{ commit.scope }}:** {% endif %}{{ commit.message | upper_first }}{% if commit.id %} ({{ commit.id | truncate(length=7, end="") }}){% endif %}
{% endfor %}\
{% endfor %}
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_parsers = [
    { message = "^feat",     group = "Features" },
    { message = "^fix",      group = "Bug fixes" },
    { message = "^perf",     group = "Performance" },
    { message = "^refactor", group = "Refactoring" },
    { message = "^test",     group = "Tests" },
    { message = "^docs",     group = "Documentation" },
    { message = "^ci",       group = "CI / Deploy" },
    { message = "^infra",    group = "Infrastructure" },
    { message = "^style",    group = "Style" },
    { message = "^chore\\(deps\\)", group = "Dependencies" },
    { message = "^chore",    group = "Miscellaneous" },
    { body = ".*security",   group = "Security" },
]
filter_commits = false
tag_pattern = "v[0-9].*"
sort_commits = "newest"
