# Local development stack for the DTS Portfolio Portal.
#
# Default usage:
#   pnpm dev                  # run Next.js on host, with `db` from compose
#   docker compose up -d db   # just start the database
#   docker compose --profile tools up -d pgadmin   # add pgAdmin on demand
#
# Full-container mode (the image the production host runs):
#   docker compose up --build

services:
  db:
    image: postgres:17-alpine
    container_name: portal-db
    environment:
      POSTGRES_USER: portal
      POSTGRES_PASSWORD: portal
      POSTGRES_DB: portal
    ports:
      - "5432:5432"
    volumes:
      - portal-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portal -d portal"]
      interval: 5s
      timeout: 3s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: portal-pgadmin
    profiles: ["tools"]
    environment:
      PGADMIN_DEFAULT_EMAIL: dev@portal.local
      PGADMIN_DEFAULT_PASSWORD: portal
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      db:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        VERSION: dev
    environment:
      DATABASE_URL: postgresql+asyncpg://portal:portal@db:5432/portal
      LOG_LEVEL: INFO
      APP_VERSION: dev
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # Multi-stage Next.js + Caddy + supervisord container.
  # Proxies all /api/* requests to the backend service.
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VERSION: dev
        PORTAL_BACKEND_URL: http://backend:8000
    environment:
      PORTAL_BACKEND_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  portal-db-data:
