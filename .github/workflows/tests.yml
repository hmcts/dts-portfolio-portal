name: Tests

# Lint + typecheck + Vitest unit + Playwright E2E + axe a11y. Spins
# up a service Postgres for Prisma so the e2e suite hits a real DB.

on:
  # Tests run on every PR as the merge gate. Re-running on push to
  # main after a PR is merged is redundant — the same commits already
  # passed on the PR — so the push trigger is intentionally omitted.
  # workflow_dispatch is kept for the rare manual rerun (e.g. after
  # a transient infra issue).
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/tests.yml'
  workflow_dispatch:

defaults:
  run:
    working-directory: frontend

permissions:
  contents: read

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: portal
          POSTGRES_PASSWORD: portal
          POSTGRES_DB: portal
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U portal -d portal"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://portal:portal@localhost:5432/portal?schema=public

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install
        # `postinstall` runs `prisma generate` automatically (via the
        # postinstall script in package.json + pnpm.onlyBuiltDependencies
        # allowlist) so the @prisma/client types resolve from this point
        # forward. The explicit `pnpm db:generate` step below is a
        # belt-and-braces safety net.
        run: pnpm install --frozen-lockfile

      - name: Prisma generate
        run: pnpm db:generate

      - name: Lint
        run: pnpm lint
        continue-on-error: true # Next lint still warming on first run; promote once baseline is clean

      - name: Typecheck
        run: pnpm typecheck

      - name: Apply migrations
        run: pnpm db:migrate:deploy

      - name: Unit tests (Vitest)
        run: pnpm test

      - name: Integration tests (Vitest, against service Postgres)
        run: pnpm test:int

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E + a11y (Playwright)
        run: pnpm test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 7

      - name: Build
        run: pnpm build
