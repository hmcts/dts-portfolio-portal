name: CodeQL

# Adapted from hmcts/courtstranscribe. Single-language (JS/TS only)
# since this repo doesn't carry Python. Schedules slightly off the
# secrets-scanner / sbom slots to spread cron load.

on:
  pull_request:
    branches:
      - main
  schedule:
    - cron: '36 5 * * 4' # Thursday 05:36 UTC

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ['javascript-typescript']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
