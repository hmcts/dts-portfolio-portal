name: Secrets Scanner

# Adapted verbatim from hmcts/courtstranscribe. Runs gitleaks via the
# shared HMCTS scanner on every PR plus a weekly cron.

on:
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 4 * * 4' # Thursday 04:00 UTC
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: hmcts/secrets-scanner@main
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          gitleaks_license: ${{ secrets.GITLEAKS_LICENSE }}
